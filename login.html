<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Portal Authentication | AxisPrime Technologies</title>
    <meta name="description"
        content="Secure login access for enterprise clients to manage projects, technical support tickets, and API architectures.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
    <script src="./scripts.js" defer></script>
    <style>
        .login-page-bg {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            padding: 2rem;
            position: relative;
        }

        .login-container {
            width: 100%;
            max-width: 440px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-lg);
            padding: 3rem 2.5rem;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 10;
        }

        .login-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2rem;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 1.5rem;
            color: var(--color-white);
            text-decoration: none;
            letter-spacing: -0.02em;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: var(--color-white);
            animation: spin 1s ease-in-out infinite;
            margin-right: 0.5rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body style="margin: 0;">

    <div class="login-page-bg">
        <!-- Optional absolute background elements -->
        <div
            style="position: absolute; top: 10%; left: 10%; width: 300px; height: 300px; background: rgba(59, 130, 246, 0.1); filter: blur(100px); border-radius: 50%;">
        </div>
        <div
            style="position: absolute; bottom: 10%; right: 10%; width: 400px; height: 400px; background: rgba(139, 92, 246, 0.05); filter: blur(150px); border-radius: 50%;">
        </div>

        <div class="login-container">
            <a href="./index.html" class="login-logo">
                <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg"
                    style="width: 30px; height: 30px; margin-right: 12px;">
                    <path d="M50 5 L95 50 L50 95 L5 50 Z" fill="url(#blueGrad_login)" />
                    <path d="M50 20 L80 50 L50 80 L20 50 Z" fill="rgba(255,255,255,0.2)" />
                    <defs>
                        <linearGradient id="blueGrad_login" x1="5" y1="5" x2="95" y2="95"
                            gradientUnits="userSpaceOnUse">
                            <stop stop-color="#3b82f6" />
                            <stop offset="1" stop-color="#1C4ED8" />
                        </linearGradient>
                    </defs>
                </svg>
                AXISPRIME
            </a>

            <div style="text-align: center; margin-bottom: 2rem;">
                <h1 style="font-size: 1.5rem; margin-bottom: 0.5rem;">Secure Authentication</h1>
                <p style="color: var(--color-gray-400); font-size: 0.9rem;">Client Workspace & Control Plane</p>
            </div>

            <form id="login-form">
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label
                        style="display: block; margin-bottom: 0.5rem; color: var(--color-gray-300); font-size: 0.85rem; font-weight: 500;">Corporate
                        Identity (Email)</label>
                    <input type="email" required
                        style="width: 100%; padding: 0.875rem 1rem; border-radius: var(--radius-sm); background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); color: var(--color-white); outline: none;">
                </div>
                <div class="form-group" style="margin-bottom: 2rem;">
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                        <label style="color: var(--color-gray-300); font-size: 0.85rem; font-weight: 500;">Access
                            Phrase</label>
                        <a href="#"
                            style="color: var(--color-secondary); font-size: 0.8rem; text-decoration: none;">Reset
                            Phrase</a>
                    </div>
                    <input type="password" required
                        style="width: 100%; padding: 0.875rem 1rem; border-radius: var(--radius-sm); background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); color: var(--color-white); outline: none;">
                </div>

                <button type="submit" id="login-btn" class="btn btn-primary"
                    style="width: 100%; height: 50px; display: flex; align-items: center; justify-content: center;">
                    <span id="btn-text">Authenticate Key</span>
                </button>
            </form>

            <div id="login-error-msg"
                style="display: none; margin-top: 1.5rem; padding: 1rem; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); border-radius: var(--radius-md); color: #ef4444; font-size: 0.9rem; text-align: center;">
                <svg width="18" height="18" viewBox="0 0 24 24" style="vertical-align: middle; margin-right: 0.25rem;">
                    <path fill="currentColor"
                        d="M11 15h2v2h-2zm0-8h2v6h-2zm.99-5C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z" />
                </svg>
                Network fault: Authorization servers are undergoing maintenance. Please failover to <a
                    href="./contact.html" style="color: #ef4444; text-decoration: underline;">manual support</a>.
            </div>

            <div
                style="margin-top: 2rem; text-align: center; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 1.5rem;">
                <p style="color: var(--color-gray-400); font-size: 0.85rem;">Do not possess clearance? <a
                        href="./contact.html"
                        style="color: var(--color-white); text-decoration: none; font-weight: 500;">Request Access
                        &rarr;</a></p>
            </div>
        </div>
    </div>
</body>

</html>
